<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Neon green background glow -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base background (Dark) -->
  <rect width="100%" height="100%" fill="#0a0a0a" rx="24"/>
  
  <!-- Outer glowing circuitry/hex shape -->
  <polygon points="50,15 80,32 80,68 50,85 20,68 20,32" fill="none" stroke="#00FF66" stroke-width="4" filter="url(#glow)" opacity="0.3"/>
  
  <!-- Main "B" Logo -->
  <path d="M38 30 H52 C58 30 62 33 62 38 C62 42 59 45 54 46 C60 47 64 50 64 56 C64 62 59 65 52 65 H38 V30 Z" fill="none" stroke="#00FF66" stroke-width="6" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M38 47 H50" fill="none" stroke="#00FF66" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Tech accent dot -->
  <circle cx="50" cy="50" r="2.5" fill="#00FF66" filter="url(#glow)"/>
</svg>
